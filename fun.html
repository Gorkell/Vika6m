<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Комната Забавных Моментов - Магическая Комната</title>
    <link rel="stylesheet" href="style.css">

<body>
    <div class="magic-room">
        <div class="stars"></div>
        <div class="floating-hearts"></div>
        
        <a href="index.html" class="back-button">← Назад</a>

        </header>

        <main class="content-container">

                <div class="floating-lock fun-lock-0">🔒</div>
                <div class="content-text">
                    <p>Тут будет текст</p>
                </div>
                <div class="audio-container">
                    <audio controls>
                        <source src="audio/fun1.mp3" type="audio/mpeg">
                        <source src="audio/fun1.ogg" type="audio/ogg">
                        Ваш браузер не поддерживает аудио.
                    </audio>
                </div>
                <div class="audio-label">Голосовое сообщение</div>
            </section>

            <section class="content-section">

                <div class="audio-label">Голосовое сообщение</div>
            </section>

            <section class="content-section">
                <div class="floating-lock fun-lock-2">🔒</div>
                <div class="content-text">
                    <p>Тут будет текст</p>
                </div>
                <div class="audio-container">

                        <source src="audio/fun3.mp3" type="audio/mpeg">
