<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретная Комната - Магическая Комната</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Дополнительные стили для секретной комнаты */
        .secret-room {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .secret-photo-container {
            position: relative;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 2s ease-in;
        }

        .secret-photo {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.3);
            animation: glow 3s ease-in-out infinite;
        }

        .secret-caption {
            margin-top: 30px;
            font-size: 1.5rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fadeIn 1s ease-in 1s forwards;
        }

        .secret-subcaption {
            margin-top: 15px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fadeIn 1s ease-in 1.5s forwards;
            font-style: italic;
        }

        /* Плавающие сердечки */
        .floating-hearts-secret {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-secret {
            position: absolute;
            font-size: 1.5rem;
            animation: float-up 8s linear infinite;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 0, 100, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 0, 100, 0.6);
            }
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Кнопка возврата */
        .back-button-secret {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-button-secret:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="magic-room">
        <div class="stars"></div>
        <div class="floating-hearts-secret" id="floatingHeartsSecret"></div>
        
        <a href="memories.html" class="back-button-secret">← Назад</a>
        
        <div class="secret-room">
            <div class="secret-photo-container">
                <img src="chot.png" alt="Секретное фото" class="secret-photo">
                <div class="secret-caption">не ожидал что ты это найдешь :></div>
                <div class="secret-subcaption">ии решил что я дед ахаха</div>
            </div>
        </div>
    </div>

    <script>
        // Создание плавающих сердечек
        document.addEventListener('DOMContentLoaded', function() {
            createFloatingHearts();
        });

        function createFloatingHearts() {
            const container = document.getElementById('floatingHeartsSecret');
            const heartEmojis = ['❤️', '💕', '💖', '💗', '💝'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-secret';
                    heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 8 + 's';
                    heart.style.animationDuration = (8 + Math.random() * 4) + 's';
                    container.appendChild(heart);
                }, i * 500);
            }
        }
    </script>
</body>
</html>
